services:
  slserver:
    image: node:20
    container_name: slserver
    working_dir: /app
    volumes:
      - ./:/app
    command: sh -c "npm install && npm run start"
    ports:
      - "3002:3002"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.slserver.rule=Host(`slserver.objectid.io`)"
      - "traefik.http.routers.slserver.entrypoints=websecure"
      - "traefik.http.routers.slserver.tls=true"
      - "traefik.http.routers.slserver.tls.certresolver=myresolver"
      - "traefik.http.services.slserver.loadbalancer.server.port=3002"
      - "traefik.http.middlewares.cors.headers.accessControlAllowMethods=GET,POST,OPTIONS"
      - "traefik.http.middlewares.cors.headers.accessControlAllowOriginList=*"
      - "traefik.http.middlewares.cors.headers.accessControlAllowHeaders=Content-Type,Authorization"
      - "traefik.http.routers.api.middlewares=cors@docker"
    networks:
      - traefik_proxy

networks:
  traefik_proxy:
    external: true
